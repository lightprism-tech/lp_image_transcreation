# Stage-1 Perception Pipeline configuration
# Override with environment variables (see README)

environment:
  env: development
  debug: false

paths:
  models_dir: models
  data_dir: data
  cache_dir: cache
  output_dir: data/output

schemas:
  object_schema: schemas/object_schema.json
  scene_schema: schemas/scene_schema.json

models:
  yolo: yolo/yolov8x.pt
  detr: facebook/detr-resnet-50
  vit_detector: google/owlv2-large-patch14-ensemble
  blip: Salesforce/blip-image-captioning-base
  clip: openai/clip-vit-large-patch14
  sam:
    model_type: vit_b
    checkpoint: sam/sam_vit_b_01ec64.pth

detectors:
  yolo:
    conf_threshold: 0.5
    iou_threshold: 0.35
    imgsz: 1280
    max_det: 300
    supplemental:
      enabled: true
      min_threshold: 0.2
      threshold_ratio: 0.6
      max_candidates: 5
      duplicate_iou: 0.55
  hybrid:
    mode: yolo_only
    duplicate_iou: 0.55
  detr:
    enabled: false
    conf_threshold: 0.5
  vit:
    enabled: false
    conf_threshold: 0.3
    labels:
      - person
      - statue
      - monument
      - building
      - bridge
      - tower
      - temple
      - mosque
      - church
      - palace
      - landmark
      - flag
      - text
  text:
    retry_upscale_factor: 1.5
    max_retries: 1
  face:
    scale_factor: 1.1
    min_neighbors: 5
    min_size: [24, 24]

thresholds:
  object_detection: 0.5
  text_detection: 0.6
  classification: 0.7

image:
  max_size: [1920, 1080]
  formats: [.jpg, .jpeg, .png, .bmp, .webp]

ocr:
  languages: [en]
  gpu: false
  use_angle_cls: true

output:
  save_debug_images: true

pipeline:
  enable_scene_graph: false
  enable_sam_segmentation: true
  enable_face_detection: true
  enable_typography_summary: true
  enable_model_warmup: true
  batch_size: 1
  fallback_actionable_classes:
    - person
    - bicycle
    - sports ball
    - baseball bat
    - tennis racket
    - surfboard
    - skateboard
    - snowboard
    - skis
    - backpack
    - handbag
    - tie
    - umbrella
    - pizza
    - hot dog
    - sandwich
    - cake
    - donut
    - cup
    - bottle

logging:
  level: INFO
  file: pipeline.log
